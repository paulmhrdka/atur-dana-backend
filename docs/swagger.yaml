basePath: /
definitions:
  atur-dana_internal_common.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      pages:
        type: integer
      total:
        type: integer
    type: object
  atur-dana_internal_common.SwaggerBadRequestResponse:
    properties:
      message:
        example: invalid date format
        type: string
      status:
        example: 400
        type: integer
    type: object
  atur-dana_internal_common.SwaggerCreatedResponse:
    properties:
      message:
        example: Transaction Created
        type: string
      status:
        example: 201
        type: integer
    type: object
  atur-dana_internal_common.SwaggerErrorResponse:
    properties:
      message:
        example: Bad Request
        type: string
      status:
        example: 400
        type: integer
    type: object
  atur-dana_internal_common.SwaggerSuccessResponse:
    properties:
      message:
        example: OK
        type: string
      status:
        example: 200
        type: integer
    type: object
  atur-dana_internal_common.SwaggerValidationErrorResponse:
    properties:
      errors:
        additionalProperties:
          type: string
        type: object
      status:
        example: error
        type: string
    type: object
  atur-dana_internal_requests.CreateBudgetRequest:
    properties:
      amount:
        example: 1000000
        type: number
      category_id:
        example: 2
        type: integer
      end_date:
        example: "2026-03-31 23:59:59"
        type: string
      start_date:
        example: "2026-03-01 00:00:00"
        type: string
    required:
    - amount
    - category_id
    - end_date
    - start_date
    type: object
  atur-dana_internal_requests.CreateTransactionRequest:
    properties:
      amount:
        example: 50000
        type: number
      category_id:
        example: 1
        type: integer
      date:
        example: "2026-03-01 00:00:00"
        type: string
      description:
        example: Monthly salary
        type: string
      type:
        enum:
        - income
        - expense
        example: income
        type: string
    required:
    - amount
    - category_id
    - date
    - description
    - type
    type: object
  atur-dana_internal_requests.LoginRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secret123
        type: string
    required:
    - email
    - password
    type: object
  atur-dana_internal_requests.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secret123
        type: string
      username:
        example: johndoe
        type: string
    required:
    - email
    - password
    - username
    type: object
  atur-dana_internal_responses.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/atur-dana_internal_responses.User'
    type: object
  atur-dana_internal_responses.BudgetResponse:
    properties:
      amount:
        type: number
      category:
        type: string
      end_date:
        type: string
      start_date:
        type: string
    type: object
  atur-dana_internal_responses.CategoryBreakdown:
    properties:
      category_id:
        type: integer
      category_name:
        type: string
      count:
        type: integer
      percentage:
        type: number
      total:
        type: number
      type:
        type: string
    type: object
  atur-dana_internal_responses.CategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
    type: object
  atur-dana_internal_responses.SummaryPeriod:
    properties:
      end_date:
        type: string
      start_date:
        type: string
    type: object
  atur-dana_internal_responses.SummaryResponse:
    properties:
      by_category:
        items:
          $ref: '#/definitions/atur-dana_internal_responses.CategoryBreakdown'
        type: array
      period:
        $ref: '#/definitions/atur-dana_internal_responses.SummaryPeriod'
      totals:
        $ref: '#/definitions/atur-dana_internal_responses.SummaryTotals'
    type: object
  atur-dana_internal_responses.SummaryTotals:
    properties:
      expense:
        type: number
      income:
        type: number
      net:
        type: number
    type: object
  atur-dana_internal_responses.SwaggerAuthResponse:
    properties:
      data:
        $ref: '#/definitions/atur-dana_internal_responses.AuthResponse'
      message:
        example: Login Successfully
        type: string
      status:
        example: 200
        type: integer
    type: object
  atur-dana_internal_responses.SwaggerBudgetListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/atur-dana_internal_responses.BudgetResponse'
        type: array
      message:
        example: Success Get Budgets
        type: string
      status:
        example: 200
        type: integer
    type: object
  atur-dana_internal_responses.SwaggerCategoryListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/atur-dana_internal_responses.CategoryResponse'
        type: array
      message:
        example: Success Get Categories
        type: string
      status:
        example: 200
        type: integer
    type: object
  atur-dana_internal_responses.SwaggerTransactionPaginatedResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/atur-dana_internal_responses.TransactionResponse'
        type: array
      message:
        example: Success Get Transactions
        type: string
      pagination:
        $ref: '#/definitions/atur-dana_internal_common.Pagination'
      status:
        example: 200
        type: integer
    type: object
  atur-dana_internal_responses.SwaggerTransactionSummaryResponse:
    properties:
      data:
        $ref: '#/definitions/atur-dana_internal_responses.SummaryResponse'
      message:
        example: Success Get Transaction Summary
        type: string
      status:
        example: 200
        type: integer
    type: object
  atur-dana_internal_responses.TransactionResponse:
    properties:
      amount:
        type: number
      category:
        type: string
      category_id:
        type: integer
      created_at:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: integer
      type:
        type: string
    type: object
  atur-dana_internal_responses.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      update_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Personal finance management API for tracking transactions and budgets.
  title: Atur Dana API
  version: "1.0"
paths:
  /api/budgets:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/atur-dana_internal_responses.SwaggerBudgetListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List budgets
      tags:
      - Budgets
    post:
      consumes:
      - application/json
      parameters:
      - description: Budget payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/atur-dana_internal_requests.CreateBudgetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerCreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a budget
      tags:
      - Budgets
  /api/categories:
    get:
      parameters:
      - description: Filter active categories only (default true)
        in: query
        name: active_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/atur-dana_internal_responses.SwaggerCategoryListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List categories for the authenticated user
      tags:
      - Categories
  /api/transactions:
    get:
      parameters:
      - description: Start date (RFC3339, e.g. 2026-01-01T00:00:00Z)
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: integer
      - description: 'Filter by type: income or expense'
        in: query
        name: type
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: 'Sort field: date or amount (default date)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc or desc (default desc)'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/atur-dana_internal_responses.SwaggerTransactionPaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerBadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: List transactions with filtering and pagination
      tags:
      - Transactions
    post:
      consumes:
      - application/json
      parameters:
      - description: Transaction payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/atur-dana_internal_requests.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerCreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a transaction
      tags:
      - Transactions
  /api/transactions/summary:
    get:
      parameters:
      - description: Start date (RFC3339)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/atur-dana_internal_responses.SwaggerTransactionSummaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerBadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      security:
      - BearerAuth: []
      summary: Get transaction summary (totals + category breakdown)
      tags:
      - Transactions
  /auth/login:
    post:
      consumes:
      - application/json
      description: Validates credentials and returns a JWT token
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/atur-dana_internal_requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/atur-dana_internal_responses.SwaggerAuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      summary: Authenticate a user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user account and returns a JWT token
      parameters:
      - description: Register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/atur-dana_internal_requests.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/atur-dana_internal_responses.SwaggerAuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /health:
    get:
      description: Returns the current health status of the service including database
        connectivity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerSuccessResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/atur-dana_internal_common.SwaggerErrorResponse'
      summary: Health check
      tags:
      - Health
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
